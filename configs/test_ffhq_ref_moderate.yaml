# This config runs batch inference on the FFHQ-Ref moderate degradation test set.

output_dir: outputs/ffhq_ref_moderate_step100_cfg15_uniform
output_name: result.png
input_mode: dataset_csv # single or dataset_csv

teacher_config_path: configs/refldm_teacher.yaml
teacher_ckpt_path: /mnt/data/shenglong/project/checkpoints/refldm.ckpt
vae_ckpt_path: /mnt/data/shenglong/project/checkpoints/vqgan.ckpt
osediff_path: ""
inference_mode: ddim_multi_step # one_step or ddim_multi_step
student_timestep: 999
ddim_step: 100
ddim_schedule: uniform
cfg_scale: 1.5
seed: 2024

input_image: /mnt/data/shenglong/project/ref-ldm/assets/demo/lq.png
reference_images:
  - /mnt/data/shenglong/project/ref-ldm/assets/demo/ref0.png
  - /mnt/data/shenglong/project/ref-ldm/assets/demo/ref1.png
  - /mnt/data/shenglong/project/ref-ldm/assets/demo/ref2.png
  - /mnt/data/shenglong/project/ref-ldm/assets/demo/ref3.png

test_file_list: /mnt/data/shenglong/project/datasets/FFHQ-Ref/reference_mapping/test_references.csv
test_lq_dir: /mnt/data/shenglong/project/datasets/FFHQ-Ref/test_images/moderate_degrad
test_ref_dir: /mnt/data/shenglong/project/datasets/FFHQ-Ref/images

image_size: [512, 512]
max_num_refs: 5
mixed_precision: fp16
merge_and_unload_lora: false
inference_iterations: 100
warmup_iterations: 5
